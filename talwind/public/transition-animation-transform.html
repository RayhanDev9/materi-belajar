<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition Animation Transform</title>

    <link rel="stylesheet" href="css/transition-animation-transform.css">
</head>
<body>
    <h1 class="text-center text-sky-600 text-4xl my-6">Transition Animation Transform</h1>

    <div class="w-40 h-40 bg-sky-500 mx-auto rounded-lg shadow-lg hover:scale-125 hover:rotate-45 origin-top-left hover:bg-pink-600 transition "></div>

<div class="w-40 h-40 bg-pink-500 mt-20 mx-auto group">
    <div class="w-full h-full bg-sky-500 rounded-lg shadow-lg group-hover:rotate-180 origin-top-right transition duration-1000 delay-100 ease-out "></div>
    
</div>

 <div class="w-40 h-40 bg-sky-500 mx-auto rounded-lg shadow-lg animate-wiggle "></div>
</body>
</html>
